<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letter</title>

<link href="https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding-top:150px;
    background:url('assets/fabric-blue.jpg') repeat;
}

/* WRAPPER */
.wrapper{
    position:relative;
    width:420px;
    height:260px;
    perspective:1200px;
}

/* BACK (ganz hinten) */
.back{
    position:absolute;
    width:100%;
    height:100%;
    background:url('assets/envelope-texture.jpg') center/cover no-repeat;
    border-radius:6px;
    box-shadow:0 15px 30px rgba(0,0,0,0.25);
    z-index:1;
}

/* LETTER */
.letter{
    position:absolute;
    width:110%;
    left:-5%;
    height:230px;
    top:40px;
    padding:60px 60px;
    box-sizing:border-box;
    background:url('assets/paper-texture.png') center/cover no-repeat;
    font-family:'Courier Prime', monospace;
    font-size:13px;
    line-height:1.8;
    color:#222;
    transform:translateY(180px);
    transition:transform 2.2s ease;
    z-index:2; /* WICHTIG */
}

.letter p{
    margin:0;
    margin-left:40px;
}

/* BOTTOM (verdeckt nur unten!) */
.bottom{
    position:absolute;
    bottom:0;
    width:100%;
    height:60%;
    background:url('assets/envelope-texture.jpg') center/cover no-repeat;
    border-bottom-left-radius:6px;
    border-bottom-right-radius:6px;
    z-index:3; /* über dem Brief */
}

/* FLAP */
.flap{
    position:absolute;
    width:100%;
    height:55%;
    top:0;
    background:url('assets/envelope-texture.jpg') center/cover no-repeat;
    clip-path: polygon(0 0, 50% 100%, 100% 0);
    transform-origin:top;
    transition:transform 1.3s ease;
    z-index:4;
    backface-visibility:hidden;
}

/* SEAL */
.seal{
    position:absolute;
    width:85px;
    height:85px;
    background:url('assets/div.seal.png') center/cover no-repeat;
    top:85px;
    left:168px;
    z-index:5;
    transition:opacity 0.4s ease;
}

/* OPEN STATE */
.open .flap{
    transform:rotateX(180deg);
}

.open .letter{
    transform:translateY(-100px); /* nicht zu hoch */
}

.open .seal{
    opacity:0;
}

/* PASSWORD */
.password{
    margin-top:160px;
    display:flex;
    gap:15px;
}

.password input{
    padding:12px 18px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:16px;
    text-align:center;
    width:200px;
}

.password button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#8b0000;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="wrapper" id="wrapper">

    <div class="back"></div>
    <div class="letter">
        <p>
        For you and me.<br>
        For us.<br>
        For every "I miss you"<br>
        and "See you soon".
        </p>
    </div>
    <div class="bottom"></div>
    <div class="flap"></div>
    <div class="seal"></div>

</div>

<div class="password">
    <input type="password" id="pw" placeholder="Enter date">
    <button onclick="openLetter()">Open</button>
</div>

<script>
const wrapper = document.getElementById("wrapper");

window.addEventListener("load",()=>{
    setTimeout(()=>{
        wrapper.classList.add("open");
    },600);
});

function openLetter(){
    wrapper.classList.add("open");
}
</script>

</body>
</html>
