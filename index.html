<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Letter</title>

<!-- Handschriftliche Schrift -->
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>
body {
    margin:0; padding:0;
    height:100vh; width:100vw;
    display:flex; justify-content:center; align-items:center;
    background: url('assets/fabric-blue.jpg') repeat;
    font-family: Georgia, serif;
    overflow:hidden;
}

/* Umschlag Container */
.envelope-wrapper {
    position: relative;
    width: 400px; height: 250px;
    perspective: 1000px;
}

/* Umschlag */
.envelope {
    width:100%; height:100%;
    background: url('assets/envelope-texture.jpg') center/cover no-repeat;
    border:1px solid #d6cbb7;
    border-radius:4px;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
    position:absolute; top:0; left:0;
    z-index:1;
}

/* Umschlagklappe */
.flap {
    position:absolute;
    width:100%; height:100%;
    background:#f4d7c2; /* Hellbeige / helles Rot */
    clip-path: polygon(0 0, 50% 50%, 100% 0);
    transform-origin: top;
    transition: transform 1s ease;
    z-index:2;
    border-bottom:1px solid #d6cbb7;
}

/* Wachssiegel */
.seal {
    position:absolute;
    width:50px; height:50px;
    background: url('assets/div.seal.jpg') center/cover no-repeat;
    top:100px; left:175px;
    z-index:3;
}

/* Brief */
.letter {
    position:absolute;
    width:90%; height:180px;
    top:20px; left:5%;
    padding:20px; box-sizing:border-box;
    background: url('assets/paper-texture.jpg') center/cover no-repeat;
    font-family: 'Dancing Script', cursive;
    font-size:22px;
    line-height:1.3;
    color:#333;
    transform: translateY(100%);
    transition: transform 1.5s ease;
    z-index:0;
    display:flex; flex-direction:column; justify-content:flex-end;
}

/* Passwortfeld */
.password-section {
    margin-top:10px;
    display:flex; justify-content:center; gap:10px;
}
.password-section input {
    padding:8px 12px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:16px;
    width:150px;
    text-align:center;
}
.password-section button {
    padding:8px 12px;
    border:none;
    border-radius:6px;
    background:#8b0000;
    color:white;
    cursor:pointer;
}
.password-section button:hover { background:#6e0000; }

/* Animation Umschlag öffnen */
.open .flap { transform: rotateX(180deg); }
.open .letter { transform: translateY(-120px); }
</style>
</head>

<body>

<div class="envelope-wrapper" id="envelope">
    <div class="envelope"></div>
    <div class="flap"></div>
    <div class="seal"></div>
    <div class="letter" id="letter">
        <p>For you and me.<br>For us.<br>For every "I miss you" and "See you soon".</p>
        <div class="password-section">
            <input type="password" id="password" placeholder="Enter date">
            <button onclick="checkPassword()">Open</button>
        </div>
    </div>
</div>

<script>
const envelope = document.getElementById('envelope');

function checkPassword(){
    const pw = document.getElementById('password').value;
    if(pw === "14.04.2025"){
        // Passwort korrekt: hier kann die Karte eingeblendet werden
        alert("Correct! Weiter geht's…");
        // Optional: weiterleiten z.B.
        // window.location.href = "map.html";
    } else {
        alert("Incorrect password 🤍");
    }
}

// Umschlag automatisch öffnen beim Laden
window.addEventListener('load', ()=>{
    setTimeout(()=>{ envelope.classList.add('open'); }, 500);
});
</script>

</body>
</html>
