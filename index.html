<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Letter</title>

<link href="https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:flex-start;
    align-items:center;
    padding-top:120px;
    background:url('assets/fabric-blue.jpg') repeat;
}

/* WRAPPER */
.envelope-wrapper{
    position:relative;
    width:420px;
    height:260px;
    perspective:1600px;
}

/* CONTAINER */
.envelope-container{
    position:relative;
    width:100%;
    height:100%;
    overflow:hidden;
    transform-style:preserve-3d;
}

/* BACK */
.envelope-back{
    position:absolute;
    width:100%;
    height:100%;
    background:url('assets/envelope-texture.jpg') center/cover no-repeat;
    border-radius:6px;
    box-shadow:0 15px 30px rgba(0,0,0,0.25);
    z-index:1;
}

/* LETTER */
.letter{
    position:absolute;
    width:110%;
    left:-5%;
    height:220px;
    top:40px;
    padding:55px 50px;
    box-sizing:border-box;
    background:url('assets/paper-texture.png') center/cover no-repeat;
    font-family:'Courier Prime', monospace;
    font-size:14px;
    line-height:1.8;
    color:#222;
    transform:translateY(200px);
    transition:transform 2.5s ease;
    z-index:2;
}

/* TEXT */
.letter p{
    margin:0;
    margin-left:35px;
}

/* FRONT (schräg geschnitten) */
.envelope-front{
    position:absolute;
    width:100%;
    height:100%;
    background:url('assets/envelope-texture.jpg') center/cover no-repeat;
    clip-path: polygon(
        0 100%, 
        0 0, 
        50% 55%, 
        100% 0, 
        100% 100%
    );
    z-index:3;
}

/* FLAP */
.flap{
    position:absolute;
    width:100%;
    height:100%;
    background:url('assets/envelope-texture.jpg') center/cover no-repeat;
    clip-path: polygon(0 0, 50% 55%, 100% 0);
    transform-origin:top;
    transition:transform 1.4s ease;
    z-index:4;
    backface-visibility:visible;
}

/* Rückseite der Klappe */
.flap::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:url('assets/envelope-texture.jpg') center/cover no-repeat;
    transform:rotateX(180deg);
}

/* SEAL */
.seal{
    position:absolute;
    width:85px;
    height:85px;
    background:url('assets/div.seal.png') center/cover no-repeat;
    top:85px;
    left:168px;
    z-index:5;
}

/* ANIMATION */
.open .flap{
    transform:rotateX(180deg);
}

.open .letter{
    transform:translateY(-140px);
}

/* PASSWORD */
.password-section{
    margin-top:140px;
    display:flex;
    gap:15px;
}

.password-section input{
    padding:12px 18px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:16px;
    text-align:center;
    width:200px;
}

.password-section button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#8b0000;
    color:white;
    cursor:pointer;
}

.password-section button:hover{
    background:#6e0000;
}
</style>
</head>

<body>

<div class="envelope-wrapper" id="envelope">
    <div class="envelope-container">

        <div class="envelope-back"></div>

        <div class="letter">
            <p>
            For you and me.<br>
            For us.<br>
            For every "I miss you"<br>
            and "See you soon".
            </p>
        </div>

        <div class="envelope-front"></div>
        <div class="flap"></div>
        <div class="seal"></div>

    </div>
</div>

<div class="password-section">
    <input type="password" id="password" placeholder="Enter date">
    <button onclick="checkPassword()">Open</button>
</div>

<script>
const envelope=document.getElementById("envelope");

window.addEventListener("load",()=>{
    setTimeout(()=>{
        envelope.classList.add("open");
    },600);
});

function checkPassword(){
    const pw=document.getElementById("password").value;
    if(pw==="14.04.2025"){
        alert("Correct 🤍");
    }else{
        alert("Incorrect password 🤍");
    }
}
</script>

</body>
</html>
