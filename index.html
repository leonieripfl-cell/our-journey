<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Envelope Step 2</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 120px;
    background: url('assets/fabric-blue.jpg') repeat;
}

/* Wrapper */
.wrapper {
    position: relative;
    width: 420px;
    height: 380px; /* höher wegen Klappe */
}

/* Umschlag-Rechteck */
.envelope-back {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 230px;
    background: url('assets/envelope-texture.jpg') center/cover no-repeat;
    border-radius: 6px;
}

/* Klappe */
.flap {
    position: absolute;
    bottom: 230px; /* exakt Höhe des Rechtecks */
    width: 100%;
    height: 150px;
    background: url('assets/envelope-texture.jpg') center/cover no-repeat;

    /* Dreieck */
    clip-path: polygon(0 100%, 50% 0%, 100% 100%);
}

/* Passwortfeld */
.password {
    margin-top: 60px;
    display: flex;
    gap: 15px;
}

.password input {
    padding: 12px 18px;
    border-radius: 8px;
    border: 1px solid #ccc;
    width: 200px;
    text-align: center;
}

.password button {
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    background: #8b0000;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="wrapper">
    <div class="envelope-back"></div>
    <div class="flap"></div>
</div>

<div class="password">
    <input type="password" placeholder="Enter date">
    <button>Open</button>
</div>

</body>
</html>
