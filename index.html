<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Envelope with Wax Seal Higher</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap');

body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 120px;
    background: url('assets/fabric-blue.jpg') repeat;
}

/* Wrapper */
.wrapper {
    position: relative;
    width: 420px;
    height: 380px;
}

/* Rückseite */
.envelope-back {
    position: absolute;
    top: 150px;
    width: 100%;
    height: 230px;
    background: url('assets/envelope-texture.jpg') center/cover no-repeat;
    filter: brightness(0.85);
    border-radius: 6px;
    z-index: 1;
}

/* Klappe */
.flap {
    position: absolute;
    top: 1px;
    width: 100%;
    height: 150px;
    background: url('assets/envelope-texture.jpg') center/cover no-repeat;
    clip-path: polygon(0 100%, 50% 0%, 100% 100%);
    z-index: 2;
}

/* Brief */
.letter {
    position: absolute;
    top: 150px;
    width: 100%;
    height: 230px;
    background: url('assets/paper-texture.png') center/cover no-repeat;
    z-index: 3;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Courier Prime', monospace;
    font-size: 16px;
    color: #333;
    text-align: center;
    padding: 20px;
    box-sizing: border-box;
    transform: translateY(0);
    animation: riseLetter 2s ease-out forwards;
}

/* Vorderseite mit Schrägen */
.envelope-front {
    position: absolute;
    top: 150px;
    width: 100%;
    height: 230px;
    background: url('assets/envelope-texture.jpg') center/cover no-repeat;
    clip-path: polygon(
        0% 0%,       
        50% 115px,   
        100% 0%,     
        100% 100%,   
        0% 100%      
    );
    z-index: 4;
}

/* Wachssiegel auf Vorderseite, noch etwas höher */
.seal {
    position: absolute;
    width: 80px;
    height: 80px;
    top: calc(150px + 115px + 5px - 40px); /* top + Siegelpunkt + 5px Verschiebung - Hälfte Höhe */
    left: 50%;
    transform: translateX(-50%);
    z-index: 4;
}

/* Passwortfeld */
.password {
    margin-top: 60px;
    display: flex;
    gap: 15px;
}

.password input {
    padding: 12px 18px;
    border-radius: 8px;
    border: 1px solid #ccc;
    width: 200px;
    text-align: center;
}

.password button {
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    background: #8b0000;
    color: white;
    cursor: pointer;
}

/* Brief Animation */
@keyframes riseLetter {
    0% { transform: translateY(0); }
    100% { transform: translateY(-115px); }
}
</style>
</head>
<body>

<div class="wrapper">
    <div class="envelope-back"></div>
    <div class="flap"></div>
    <div class="letter">
        For you and me.<br>
        For us.<br>
        For every "i miss you"<br>
        and "see you soon".
    </div>
    <div class="envelope-front"></div>

    <!-- Wachssiegel -->
    <img src="assets/div.seal.png" alt="Wax Seal" class="seal">
</div>

<div class="password">
    <input type="password" placeholder="Enter date">
    <button>Open</button>
</div>

</body>
</html>
