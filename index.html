<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Envelope Step 3 Corrected</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 120px;
    background: url('assets/fabric-blue.jpg') repeat;
}

/* Wrapper */
.wrapper {
    position: relative;
    width: 420px;
    height: 380px;
}

/* Umschlag-Rückseite – leicht dunkler */
.envelope-back {
    position: absolute;
    top: 150px;
    width: 100%;
    height: 230px;
    background: url('assets/envelope-texture.jpg') center/cover no-repeat;
    filter: brightness(0.85); /* Abdunkeln */
    border-radius: 6px;
    z-index: 1;
}

/* Vorderseite mit Schrägen korrekt von oben zu Siegel */
.envelope-front {
    position: absolute;
    top: 150px; /* exakt auf Rückseite */
    width: 100%;
    height: 230px;
    background: url('assets/envelope-texture.jpg') center/cover no-repeat;

    clip-path: polygon(
        0% 0%,     /* obere linke Ecke */
        50% 40px,  /* Punkt unter Siegel */
        100% 0%,   /* obere rechte Ecke */
        100% 100%, /* untere rechte Ecke */
        0% 100%    /* untere linke Ecke */
    );
    z-index: 3;
}

/* Klappe */
.flap {
    position: absolute;
    top: 1px;
    width: 100%;
    height: 150px;
    background: url('assets/envelope-texture.jpg') center/cover no-repeat;
    clip-path: polygon(0 100%, 50% 0%, 100% 100%);
    z-index: 4;
}

/* Passwortfeld */
.password {
    margin-top: 60px;
    display: flex;
    gap: 15px;
}

.password input {
    padding: 12px 18px;
    border-radius: 8px;
    border: 1px solid #ccc;
    width: 200px;
    text-align: center;
}

.password button {
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    background: #8b0000;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="wrapper">
    <div class="flap"></div>
    <div class="envelope-front"></div>
    <div class="envelope-back"></div>
</div>

<div class="password">
    <input type="password" placeholder="Enter date">
    <button>Open</button>
</div>

</body>
</html>
