<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Letter</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:url('assets/fabric-blue.jpg') repeat;
    font-family:Georgia, serif;
}

/* WRAPPER */
.envelope-wrapper {
    position:relative;
    width:420px;
    height:260px;
    perspective:1200px;
}

/* HINTERSEITE (fixes Rechteck) */
.envelope-back {
    position:absolute;
    width:100%;
    height:100%;
    background:url('assets/envelope-texture.jpg') center/cover no-repeat;
    border-radius:6px;
    box-shadow:0 15px 30px rgba(0,0,0,0.25);
    z-index:1;
}

/* BRIEF */
.letter {
    position:absolute;
    width:100%;
    height:200px;
    top:40px;
    left:0;
    padding:30px;
    box-sizing:border-box;
    background:url('assets/paper-texture.png') center/cover no-repeat;
    font-family:'Dancing Script', cursive;
    font-size:24px;
    color:#333;
    transform:translateY(120px);
    transition:transform 1.8s ease;
    z-index:2;
}

/* VORDERSEITE (verdeckt unteren Teil) */
.envelope-front {
    position:absolute;
    bottom:0;
    width:100%;
    height:55%;
    background:url('assets/envelope-texture.jpg') center/cover no-repeat;
    border-bottom-left-radius:6px;
    border-bottom-right-radius:6px;
    z-index:3;
}

/* KLAPPE */
.flap {
    position:absolute;
    width:100%;
    height:100%;
    background:url('assets/envelope-texture.jpg') center/cover no-repeat;
    clip-path: polygon(0 0, 50% 55%, 100% 0);
    transform-origin:top;
    transition:transform 1.2s ease;
    z-index:4;
}

/* WACHSSIEGEL */
.seal {
    position:absolute;
    width:75px;
    height:75px;
    background:url('assets/div.seal.png') center/cover no-repeat;
    top:90px;
    left:172px;
    z-index:5;
}

/* ANIMATION */
.open .flap {
    transform:rotateX(180deg);
}

.open .letter {
    transform:translateY(-60px);
}

/* PASSWORT */
.password-section {
    margin-top:80px;
    display:flex;
    gap:15px;
}

.password-section input {
    padding:12px 18px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:16px;
    text-align:center;
    width:200px;
}

.password-section button {
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#8b0000;
    color:white;
    cursor:pointer;
}

.password-section button:hover {
    background:#6e0000;
}
</style>
</head>

<body>

<div class="envelope-wrapper" id="envelope">

    <div class="envelope-back"></div>

    <div class="letter">
        For you and me.<br>
        For us.<br>
        For every "I miss you"<br>
        and "See you soon".
    </div>

    <div class="envelope-front"></div>
    <div class="flap"></div>
    <div class="seal"></div>

</div>

<div class="password-section">
    <input type="password" id="password" placeholder="Enter date">
    <button onclick="checkPassword()">Open</button>
</div>

<script>
const envelope = document.getElementById("envelope");

window.addEventListener("load", ()=>{
    setTimeout(()=>{
        envelope.classList.add("open");
    },600);
});

function checkPassword(){
    const pw = document.getElementById("password").value;
    if(pw === "14.04.2025"){
        alert("Correct 🤍");
    } else {
        alert("Incorrect password 🤍");
    }
}
</script>

</body>
</html>
