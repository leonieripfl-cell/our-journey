<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Letter</title>

<link href="https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:flex-start;
    align-items:center;
    padding-top:140px;
    background:url('assets/fabric-blue.jpg') repeat;
}

/* WRAPPER */
.envelope-wrapper{
    position:relative;
    width:420px;
    height:260px;
    perspective:2000px;
}

/* LETTER (darf frei rausfahren) */
.letter{
    position:absolute;
    width:110%;
    left:-5%;
    height:230px;
    top:40px;
    padding:60px 55px;
    box-sizing:border-box;
    background:url('assets/paper-texture.png') center/cover no-repeat;
    font-family:'Courier Prime', monospace;
    font-size:13px;
    line-height:1.9;
    color:#222;
    transform:translateY(200px);
    transition:transform 2.5s ease;
    z-index:1;
}

.letter p{
    margin:0;
    margin-left:45px;
}

/* ENVELOPE SHELL */
.envelope-shell{
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:0;
}

/* BACK */
.envelope-back{
    position:absolute;
    width:100%;
    height:100%;
    background:url('assets/envelope-texture.jpg') center/cover no-repeat;
    border-radius:6px;
    box-shadow:0 15px 30px rgba(0,0,0,0.25);
    z-index:2;
}

/* FRONT (schräg) */
.envelope-front{
    position:absolute;
    width:100%;
    height:100%;
    background:url('assets/envelope-texture.jpg') center/cover no-repeat;
    clip-path: polygon(
        0 100%, 
        0 0, 
        50% 55%, 
        100% 0, 
        100% 100%
    );
    z-index:3;
}

/* FLAP */
.flap{
    position:absolute;
    width:100%;
    height:100%;
    transform-style:preserve-3d;
    transform-origin:top;
    transition:transform 1.5s ease;
    z-index:4;
}

/* Vorderseite der Klappe */
.flap-front{
    position:absolute;
    width:100%;
    height:100%;
    background:url('assets/envelope-texture.jpg') center/cover no-repeat;
    clip-path: polygon(0 0, 50% 55%, 100% 0);
    backface-visibility:hidden;
}

/* Rückseite der Klappe */
.flap-back{
    position:absolute;
    width:100%;
    height:100%;
    background:url('assets/envelope-texture.jpg') center/cover no-repeat;
    clip-path: polygon(0 0, 50% 55%, 100% 0);
    transform:rotateX(180deg);
    backface-visibility:hidden;
}

/* SEAL */
.seal{
    position:absolute;
    width:85px;
    height:85px;
    background:url('assets/div.seal.png') center/cover no-repeat;
    top:85px;
    left:168px;
    z-index:5;
}

/* ANIMATION */
.open .flap{
    transform:rotateX(180deg);
}

.open .letter{
    transform:translateY(-180px);
}

/* PASSWORD */
.password-section{
    margin-top:160px;
    display:flex;
    gap:15px;
}

.password-section input{
    padding:12px 18px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:16px;
    text-align:center;
    width:200px;
}

.password-section button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#8b0000;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="envelope-wrapper" id="envelope">

    <div class="letter">
        <p>
        For you and me.<br>
        For us.<br>
        For every "I miss you"<br>
        and "See you soon".
        </p>
    </div>

    <div class="envelope-shell">
        <div class="envelope-back"></div>
        <div class="envelope-front"></div>

        <div class="flap">
            <div class="flap-front"></div>
            <div class="flap-back"></div>
        </div>

        <div class="seal"></div>
    </div>

</div>

<div class="password-section">
    <input type="password" id="password" placeholder="Enter date">
    <button onclick="checkPassword()">Open</button>
</div>

<script>
const envelope=document.getElementById("envelope");

window.addEventListener("load",()=>{
    setTimeout(()=>{
        envelope.classList.add("open");
    },600);
});

function checkPassword(){
    const pw=document.getElementById("password").value;
    if(pw==="14.04.2025"){
        alert("Correct 🤍");
    }else{
        alert("Incorrect password 🤍");
    }
}
</script>

</body>
</html>
