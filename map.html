<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Journey</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
 integrity="sha256-sA+4fNfQ2VhP6XVRpG0Fw/0y4kZzUYoB01q+3yTtY3o=" crossorigin=""/>

<style>
body { margin:0; padding:0; font-family:Georgia, serif; background:#f4f1ea; }
#map { width: 100vw; height: 100vh; }
.timer {
    position: absolute; top: 10px; right: 20px;
    background: rgba(255,255,255,0.8); padding:10px; border-radius:8px;
    font-size:18px; z-index:1000;
}
</style>
</head>
<body>

<div class="timer" id="timer">Loading timer...</div>
<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
 integrity="sha256-o+Zk3p6N3Xo0FkRfZ8Ww5C2Hq9w2KPh3y2XygfF8Bjo=" crossorigin=""></script>

<script>
// 1️⃣ Karte initialisieren
var map = L.map('map', {zoomControl:true}).setView([50, 10], 4); // Zoom auf Europa

// 2️⃣ Vintage/leicht pastellfarbiger Tile-Layer
L.tileLayer('https://stamen-tiles.a.ssl.fastly.net/terrain/{z}/{x}/{y}.jpg', {
    attribution: 'Map tiles by Stamen Design',
    minZoom: 2,
    maxZoom: 18
}).addTo(map);

// 3️⃣ Haus-Icons
var houseIcon = L.icon({
    iconUrl: 'https://i.ibb.co/Tmbj8x9/house-icon.png', // wir ersetzen später durch gezeichnete Version
    iconSize: [40, 40]
});

L.marker([48.2082,16.3738], {icon: houseIcon}).addTo(map).bindPopup("Wien 🏠");
L.marker([55.9533,-3.1883], {icon: houseIcon}).addTo(map).bindPopup("Edinburgh 🏠"); // Edinburgh-Koordinaten

// 4️⃣ Beziehungstimer
function updateTimer(){
    var start = new Date("2023-08-01T00:00:00"); // Hier euer Startdatum
    var now = new Date();
    var diff = now - start;
    var days = Math.floor(diff / (1000*60*60*24));
    document.getElementById('timer').innerText = days + " days together ❤️";
}
setInterval(updateTimer,1000);
updateTimer();
</script>

</body>
</html>
