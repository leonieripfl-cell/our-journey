<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Journey</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body, html {
    margin: 0;
    height: 100%;
    font-family: 'Courier Prime', monospace;
}

#map {
    width: 100%;
    height: 100vh;
}

/* Popup-Fotoalbum */
.popup-album img {
    width: 100px;
    margin: 5px;
}

/* Papierflieger Button */
#paperPlaneButton {
    position: absolute;
    top: 20px;
    right: 20px;
    z-index: 1000;
    padding: 12px 18px;
    background: #8b0000;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>
<body>

<button id="paperPlaneButton">Papierflieger senden</button>
<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// Leaflet Karte initialisieren
const map = L.map('map').setView([48.2082, 16.3738], 4); // Start auf Wien/Europa

// OpenStreetMap Layer
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
}).addTo(map);

// Marker Icons
const houseIcon = L.icon({
    iconUrl: 'assets/house.png',
    iconSize: [40, 40],
    iconAnchor: [20, 40],
});

const planeIcon = L.icon({
    iconUrl: 'assets/paperplane.png',
    iconSize: [40, 40],
    iconAnchor: [20, 20],
});

// Hauptmarker: Edinburgh & Wien
const edinburgh = L.marker([55.9533, -3.1883], {icon: houseIcon}).addTo(map).bindPopup('<b>Edinburgh</b>');
const wien = L.marker([48.2082, 16.3738], {icon: houseIcon}).addTo(map).bindPopup('<b>Wien</b>');

// Beispiel-Reisepins
const stirling = L.marker([56.1165, -3.9369]).addTo(map).bindPopup('<div class="popup-album"><b>Stirling</b><br><img src="assets/stirling1.jpg"><img src="assets/stirling2.jpg"></div>');
const budapest = L.marker([47.4979, 19.0402]).addTo(map).bindPopup('<div class="popup-album"><b>Budapest</b><br><img src="assets/budapest1.jpg"><img src="assets/budapest2.jpg"></div>');

// Papierflieger Funktion
const paperPlanes = []; // lokal gespeicherte Nachrichten

document.getElementById('paperPlaneButton').addEventListener('click', () => {
    const msg = prompt("Schreibe eine Nachricht für den Papierflieger:");
    if(msg) {
        // Plane speichern
        paperPlanes.push(msg);
        localStorage.setItem('paperPlanes', JSON.stringify(paperPlanes));

        // Animation: einfacher Marker für Papierflieger zwischen Wien ↔ Edinburgh
        const start = wien.getLatLng();
        const end = edinburgh.getLatLng();
        const planeMarker = L.marker(start, {icon: planeIcon}).addTo(map);

        let step = 0;
        const steps = 100;
        const interval = setInterval(() => {
            const lat = start.lat + (end.lat - start.lat) * (step/steps);
            const lng = start.lng + (end.lng - start.lng) * (step/steps);
            planeMarker.setLatLng([lat, lng]);
            step++;
            if(step > steps) {
                clearInterval(interval);
                planeMarker.remove();
                alert("Papierflieger angekommen! Nachricht gespeichert.");
            }
        }, 15);
    }
});

// Gespeicherte Papierflieger beim Laden abrufen
const savedPlanes = JSON.parse(localStorage.getItem('paperPlanes') || '[]');
console.log("Gespeicherte Papierflieger:", savedPlanes);

</script>

</body>
</html>
