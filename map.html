<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Journey Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap" rel="stylesheet">

<style>
body, html {
    margin: 0;
    height: 100%;
    font-family: 'Courier Prime', monospace;
}

#map {
    width: 100%;
    height: 100vh;
}

/* Days together */
#daysTogether {
    position: absolute;
    bottom: 20px;
    left: 20px;
    z-index: 1000;
    background: rgba(255,255,255,0.85);
    padding: 10px 15px;
    border-radius: 8px;
    font-size: 16px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
}

/* Icon bar */
#iconBar {
    position: absolute;
    top: 20px;
    right: 20px;
    z-index: 1000;
    display: flex;
    gap: 10px;
}

.icon-button {
    width: 50px;
    height: 50px;
    border-radius: 8px;
    background: white;
    border: 1px solid #ccc;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
}

.icon-button img {
    width: 70%;
    height: 70%;
    object-fit: contain;
}

#penIcon img {
    width: 60%;
    height: 60%;
}

/* Panels */
.panel {
    position: absolute;
    top: 80px;
    right: 20px;
    z-index: 1000;
    background: white;
    padding: 15px;
    border-radius: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    display: none;
    width: 250px;
    max-height: 300px;
    overflow-y: auto;
}

.panel input, .panel textarea {
    width: 100%;
    margin-bottom: 8px;
    padding: 6px;
    border-radius: 4px;
    border: 1px solid #ccc;
}

.panel button {
    width: 100%;
    padding: 8px;
    background: #8b0000;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}

/* Paperplane */
.plane-animation {
    position: absolute;
    width: 40px;
    height: 40px;
    background-size: contain;
    background-repeat: no-repeat;
    z-index: 999;
    pointer-events: none;
}
</style>
</head>
<body>

<div id="daysTogether"><span id="daysCount">0</span> days together</div>

<div id="iconBar">
    <div id="planeIcon" class="icon-button">
        <img src="assets/plane.png">
    </div>
    <div id="penIcon" class="icon-button">
        <img src="assets/pen.png">
    </div>
</div>

<div id="planePanel" class="panel">
    <h3>Sent Paperplanes</h3>
    <ul id="planeList"></ul>
</div>

<div id="letterPanel" class="panel">
    <h3>Write a Letter</h3>
    <textarea id="letterText" rows="5"></textarea>
    <button id="sendLetter">Send</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// Map
const map = L.map('map').setView([51, 10], 5);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OSM &copy; CARTO',
    subdomains: 'abcd',
    maxZoom: 19
}).addTo(map);

// Icons
const viennaIcon = L.icon({iconUrl:'assets/house.vienna.png', iconSize:[40,40], iconAnchor:[20,40]});
const edinburghIcon = L.icon({iconUrl:'assets/house.edinburgh.png', iconSize:[40,40], iconAnchor:[20,40]});

const vienna = L.marker([48.2082, 16.3738], {icon: viennaIcon}).addTo(map).bindPopup("Vienna");
const edinburgh = L.marker([55.9533, -3.1883], {icon: edinburghIcon}).addTo(map).bindPopup("Edinburgh");

// Panels
planeIcon.onclick = () => {
    planePanel.style.display = planePanel.style.display === "none" ? "block" : "none";
    letterPanel.style.display = "none";
};

penIcon.onclick = () => {
    letterPanel.style.display = letterPanel.style.display === "none" ? "block" : "none";
    planePanel.style.display = "none";
};

// Paperplanes storage
let paperPlanes = JSON.parse(localStorage.getItem("paperPlanes") || "[]");
const planeList = document.getElementById("planeList");

function updatePlaneList() {
    planeList.innerHTML = "";
    paperPlanes.forEach(msg => {
        const li = document.createElement("li");
        li.textContent = msg;
        planeList.appendChild(li);
    });
}
updatePlaneList();

// SEND LETTER WITH CURVED FLIGHT + TRAIL
document.getElementById("sendLetter").addEventListener("click", () => {

    const msg = letterText.value;
    if(!msg) { alert("Please write a letter!"); return; }

    let sender = prompt("Who are you? (Saul / Leonie)");
    sender = sender?.trim().toLowerCase();
    if(sender !== "saul" && sender !== "leonie") { alert("Invalid sender!"); return; }

    // Correct direction
    const start = sender === "saul" ? edinburgh.getLatLng() : vienna.getLatLng();
    const end = sender === "saul" ? vienna.getLatLng() : edinburgh.getLatLng();
    const planeImg = sender === "saul"
        ? "assets/paperplane.to.vienna.png"
        : "assets/paperplane.to.edinburgh.png";

    const startPoint = map.latLngToContainerPoint(start);
    const endPoint = map.latLngToContainerPoint(end);

    const plane = document.createElement("div");
    plane.className = "plane-animation";
    plane.style.backgroundImage = `url('${planeImg}')`;
    document.body.appendChild(plane);

    const trail = document.createElement("canvas");
    trail.width = window.innerWidth;
    trail.height = window.innerHeight;
    trail.style.position = "absolute";
    trail.style.left = 0;
    trail.style.top = 0;
    trail.style.pointerEvents = "none";
    trail.style.zIndex = 998;
    document.body.appendChild(trail);

    const ctx = trail.getContext("2d");
    ctx.setLineDash([6,6]);
    ctx.strokeStyle = "rgba(0,0,0,0.6)";
    ctx.lineWidth = 2;

    const duration = 2200;
    let startTime = null;

    function animate(timestamp) {
        if(!startTime) startTime = timestamp;
        const progress = Math.min((timestamp - startTime)/duration, 1);

        const x = startPoint.x + (endPoint.x - startPoint.x)*progress;
        const yLinear = startPoint.y + (endPoint.y - startPoint.y)*progress;
        const curve = Math.sin(progress * Math.PI) * 120;
        const y = yLinear - curve;

        plane.style.left = x + "px";
        plane.style.top = y + "px";

        ctx.clearRect(0,0,trail.width,trail.height);
        ctx.beginPath();
        ctx.moveTo(startPoint.x, startPoint.y);
        ctx.lineTo(x, y);
        ctx.stroke();

        if(progress < 1) {
            requestAnimationFrame(animate);
        } else {
            plane.remove();
            setTimeout(() => {
                trail.style.transition = "opacity 1s";
                trail.style.opacity = 0;
                setTimeout(()=>trail.remove(),1000);
            }, 1000);

            paperPlanes.push(msg);
            localStorage.setItem("paperPlanes", JSON.stringify(paperPlanes));
            updatePlaneList();
        }
    }

    requestAnimationFrame(animate);

    letterText.value = "";
    letterPanel.style.display = "none";
});

// Days together
function updateDaysTogether() {
    const startDate = new Date("2025-04-14");
    const today = new Date();
    const diff = Math.floor((today - startDate)/(1000*60*60*24));
    daysCount.textContent = diff;
}
updateDaysTogether();
setInterval(updateDaysTogether, 60000);

</script>
</body>
</html>
