<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Journey Map</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body, html {
    margin: 0;
    height: 100%;
    font-family: 'Courier Prime', monospace;
}

#map {
    width: 100%;
    height: 100vh;
}

/* Popup-Fotoalbum */
.popup-album img {
    width: 100px;
    margin: 5px;
}

/* Icon-Leiste oben rechts */
#iconBar {
    position: absolute;
    top: 20px;
    right: 20px;
    z-index: 1000;
    display: flex;
    gap: 10px;
}

.icon-button {
    width: 50px;
    height: 50px;
    border-radius: 8px;
    background: white;
    border: 1px solid #ccc;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
}

/* Panels */
.panel {
    position: absolute;
    top: 80px;
    right: 20px;
    z-index: 1000;
    background: white;
    padding: 15px;
    border-radius: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    display: none;
    width: 250px;
    max-height: 300px;
    overflow-y: auto;
}

.panel h3 {
    margin-top: 0;
}

/* Formularfelder */
.panel input, .panel textarea {
    width: 100%;
    margin-bottom: 8px;
    padding: 6px;
    border-radius: 4px;
    border: 1px solid #ccc;
}
.panel button {
    width: 100%;
    padding: 8px;
    background: #8b0000;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}
</style>
</head>
<body>

<!-- Icon-Leiste mit PNGs -->
<div id="iconBar">
    <div id="planeIcon" class="icon-button" title="Papierflieger">
        <img src="assets/plane.png" alt="Papierflieger" style="width: 80%; height: 80%;">
    </div>
    <div id="penIcon" class="icon-button" title="Brief verfassen">
        <img src="assets/pen.png" alt="Füllfeder" style="width: 80%; height: 80%;">
    </div>
    <div id="pinIcon" class="icon-button" title="Pin hinzufügen">
        <img src="assets/pin.png" alt="Pin" style="width: 80%; height: 80%;">
    </div>
</div>

<!-- Panels -->
<div id="planePanel" class="panel">
    <h3>Gesendete Papierflieger</h3>
    <ul id="planeList"></ul>
</div>

<div id="letterPanel" class="panel">
    <h3>Neuen Brief verfassen</h3>
    <textarea id="letterText" rows="5" placeholder="Schreibe hier deinen Brief..."></textarea>
    <button id="sendLetter">Senden</button>
</div>

<div id="addPinForm" class="panel">
    <h3>Neuen Pin hinzufügen</h3>
    <input type="text" id="pinName" placeholder="Name des Ortes">
    <input type="text" id="pinImage" placeholder="Bild-URL">
    <input type="text" id="pinText" placeholder="Text">
    <button id="savePin">Pin hinzufügen</button>
</div>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// Karte initialisieren
const map = L.map('map').setView([48.2082, 16.3738], 4);

// Schönerer Tile-Layer
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OSM &copy; CARTO',
    subdomains: 'abcd',
    maxZoom: 19
}).addTo(map);

// Icons
const houseIcon = L.icon({iconUrl:'assets/house.png', iconSize:[40,40], iconAnchor:[20,40]});
const planeIcon = L.icon({iconUrl:'assets/paperplane.png', iconSize:[40,40], iconAnchor:[20,20]});

// Hauptmarker
const edinburgh = L.marker([55.9533, -3.1883], {icon: houseIcon}).addTo(map).bindPopup('<b>Edinburgh</b>');
const wien = L.marker([48.2082, 16.3738], {icon: houseIcon}).addTo(map).bindPopup('<b>Wien</b>');

// Beispielpins
const stirling = L.marker([56.1165, -3.9369]).addTo(map)
.bindPopup('<div class="popup-album"><b>Stirling</b><br><img src="assets/stirling1.jpg"><img src="assets/stirling2.jpg"></div>');
const budapest = L.marker([47.4979, 19.0402]).addTo(map)
.bindPopup('<div class="popup-album"><b>Budapest</b><br><img src="assets/budapest1.jpg"><img src="assets/budapest2.jpg"></div>');

// Papierflieger-Liste
let paperPlanes = JSON.parse(localStorage.getItem('paperPlanes') || '[]');
const planeList = document.getElementById('planeList');
function updatePlaneList() {
    planeList.innerHTML = '';
    paperPlanes.forEach((msg, i) => {
        const li = document.createElement('li');
        li.textContent = msg;
        planeList.appendChild(li);
    });
}
updatePlaneList();

// Icon-Buttons
const planePanel = document.getElementById('planePanel');
const letterPanel = document.getElementById('letterPanel');
const addPinForm = document.getElementById('addPinForm');

document.getElementById('planeIcon').addEventListener('click', () => {
    planePanel.style.display = planePanel.style.display === 'none' ? 'block' : 'none';
    letterPanel.style.display = 'none';
    addPinForm.style.display = 'none';
});

document.getElementById('penIcon').addEventListener('click', () => {
    letterPanel.style.display = letterPanel.style.display === 'none' ? 'block' : 'none';
    planePanel.style.display = 'none';
    addPinForm.style.display = 'none';
});

document.getElementById('pinIcon').addEventListener('click', () => {
    addPinForm.style.display = addPinForm.style.display === 'none' ? 'block' : 'none';
    planePanel.style.display = 'none';
    letterPanel.style.display = 'none';
});

// Brief senden (Papierflieger)
document.getElementById('sendLetter').addEventListener('click', () => {
    const msg = document.getElementById('letterText').value;
    if(msg) {
        paperPlanes.push(msg);
        localStorage.setItem('paperPlanes', JSON.stringify(paperPlanes));
        updatePlaneList();
        alert("Brief gesendet!");
        document.getElementById('letterText').value = '';
        letterPanel.style.display = 'none';
    }
});

// Pin hinzufügen
document.getElementById('savePin').addEventListener('click', () => {
    const name = document.getElementById('pinName').value;
    const img = document.getElementById('pinImage').value;
    const text = document.getElementById('pinText').value;
    if(!name) { alert("Bitte Namen eingeben!"); return; }

    L.marker(map.getCenter()).addTo(map)
        .bindPopup(`<div class="popup-album"><b>${name}</b><br>${text}<br><img src="${img}"></div>`);

    document.getElementById('pinName').value = '';
    document.getElementById('pinImage').value = '';
    document.getElementById('pinText').value = '';
    addPinForm.style.display = 'none';
});
</script>

</body>
</html>
