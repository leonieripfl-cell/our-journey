  <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Journey Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap" rel="stylesheet">

<style>
body, html {
    margin: 0;
    height: 100%;
    font-family: 'Courier Prime', monospace;
}

#map {
    width: 100%;
    height: 100vh;
}

/* Days together */
#daysTogether {
    position: absolute;
    bottom: 20px;
    left: 20px;
    z-index: 1000;
    background: rgba(255,255,255,0.9);
    padding: 10px 15px;
    border-radius: 8px;
    font-size: 16px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.25);
}

/* Icon bar */
#iconBar {
    position: absolute;
    top: 20px;
    right: 20px;
    z-index: 1000;
    display: flex;
    gap: 10px;
}

.icon-button {
    width: 50px;
    height: 50px;
    border-radius: 10px;
    background: white;
    border: 1px solid #ddd;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 2px 5px rgba(0,0,0,0.25);
}

.icon-button img {
    width: 65%;
    height: 65%;
    object-fit: contain;
}

#penIcon img {
    width: 55%;
}

/* Panels */
.panel {
    position: absolute;
    top: 85px;
    right: 20px;
    z-index: 1000;
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.3);
    display: none;
    width: 260px;
    max-height: 300px;
    overflow-y: auto;
}

.panel textarea {
    width: 100%;
    margin-bottom: 10px;
    padding: 6px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

.panel button {
    width: 100%;
    padding: 8px;
    background: #8b0000;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.plane-animation {
    position: absolute;
    width: 42px;
    height: 42px;
    background-size: contain;
    background-repeat: no-repeat;
    pointer-events: none;
    z-index: 999;
}
</style>
</head>
<body>

<div id="daysTogether"><span id="daysCount">0</span> days together</div>

<div id="iconBar">
    <div id="planeIcon" class="icon-button">
        <img src="assets/plane.png">
    </div>
    <div id="penIcon" class="icon-button">
        <img src="assets/pen.png">
    </div>
    <div id="pinIcon" class="icon-button">
        <img src="assets/pin.png">
    </div>
</div>

<div id="planePanel" class="panel">
    <h3>Sent Paperplanes</h3>
    <ul id="planeList"></ul>
</div>

<div id="letterPanel" class="panel">
    <h3>Write a Letter</h3>
    <textarea id="letterText" rows="5"></textarea>
    <button id="sendLetter">Send</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// ================= MAP =================

const map = L.map('map').setView([54, 15], 4);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OSM &copy; CARTO',
    subdomains: 'abcd',
    maxZoom: 19
}).addTo(map);

// Icons
const viennaIcon = L.icon({
    iconUrl: 'assets/house.vienna.png',
    iconSize: [42, 42],
    iconAnchor: [21, 42]
});

const edinburghIcon = L.icon({
    iconUrl: 'assets/house.edinburgh.png',
    iconSize: [42, 42],
    iconAnchor: [21, 42]
});

const travelPinIcon = L.icon({
    iconUrl: 'assets/pin.on.map.png',
    iconSize: [32, 32],
    iconAnchor: [16, 32]
});

// Houses
const vienna = L.marker([48.2082, 16.3738], {icon: viennaIcon}).addTo(map).bindPopup("Vienna");
const edinburgh = L.marker([55.9533, -3.1883], {icon: edinburghIcon}).addTo(map).bindPopup("Edinburgh");

// Budapest pin (restored)
L.marker([47.4979, 19.0402], {icon: travelPinIcon})
    .addTo(map)
    .bindPopup("Budapest");

// ================= PIN CREATION =================

let pinMode = false;

pinIcon.onclick = () => {
    pinMode = !pinMode;
    pinIcon.style.background = pinMode ? "#ffe6e6" : "white";
};

map.on("click", function(e) {
    if (!pinMode) return;

    const newPin = L.marker(e.latlng, {icon: travelPinIcon})
        .addTo(map)
        .bindPopup("New memory spot 💕")
        .openPopup();

    pinMode = false;
    pinIcon.style.background = "white";
});

// ================= PANELS =================

planeIcon.onclick = () => {
    planePanel.style.display = planePanel.style.display === "block" ? "none" : "block";
    letterPanel.style.display = "none";
};

penIcon.onclick = () => {
    letterPanel.style.display = letterPanel.style.display === "block" ? "none" : "block";
    planePanel.style.display = "none";
};

// ================= DAYS TOGETHER =================

function updateDaysTogether() {
    const startDate = new Date("2025-04-14");
    const today = new Date();
    const diff = Math.floor((today - startDate)/(1000*60*60*24));
    daysCount.textContent = diff;
}
updateDaysTogether();
setInterval(updateDaysTogether, 60000);

</script>
</body>
</html>
