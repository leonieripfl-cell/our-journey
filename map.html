<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Journey</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { margin:0; padding:0; font-family:Georgia, serif; background:#f4f1ea; }
#map { width:100vw; height:100vh; }

.timer {
    position:absolute; top:10px; right:20px;
    background: rgba(255,255,255,0.8); padding:10px; border-radius:8px;
    font-size:18px; z-index:1000;
}

/* Papierflieger */
.plane { width:40px; height:40px; position:absolute; z-index:1000; background:url('https://i.ibb.co/2h6Kp3D/white-paper-plane.png') no-repeat center/contain; display:none; }

/* Pinnnadeln & Scrapbook */
.popup-photo { width:200px; position: relative; }
.popup-photo img {
    width:100%; transform: rotate(-5deg); border:2px solid #fff; box-shadow:0 2px 6px rgba(0,0,0,0.3); position:relative;
}
.popup-photo .tape { position:absolute; width:40px; height:15px; background:#ffe4b5; top:-5px; left:30px; transform:rotate(-15deg); }

/* Tag/Nacht Modus */
body.night { background:#2c2c2c; }
.leaflet-tile { filter: brightness(0.9) saturate(0.9); }
</style>
</head>
<body>

<div class="timer" id="timer">Loading timer...</div>
<div id="map"></div>
<div class="plane" id="plane"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// --- Karte ---
var map = L.map('map', {zoomControl:true}).setView([50,10],4);
L.tileLayer('https://stamen-tiles.a.ssl.fastly.net/terrain/{z}/{x}/{y}.jpg',{
    attribution:'Map tiles by Stamen Design', minZoom:2, maxZoom:18
}).addTo(map);

// --- Beziehungstimer ---
function updateTimer(){
    var start = new Date("2023-08-01T00:00:00");
    var now = new Date();
    var diff = now - start;
    var days = Math.floor(diff/(1000*60*60*24));
    document.getElementById('timer').innerText = days + " days together ❤️";
}
setInterval(updateTimer,1000);
updateTimer();

// --- Locations Array (erweiterbar) ---
const locations = [
    { name:"Wien", coords:[48.2082,16.3738], icon:"house", popupContent:"🏠 Home sweet home" },
    { name:"Edinburgh", coords:[55.9533,-3.1883], icon:"house", popupContent:"🏠 Home sweet home" },
    { name:"Berlin", coords:[52.52,13.405], icon:"pin", popupContent:`<div class="popup-photo"><div class="tape"></div><img src="https://i.ibb.co/LkKXr7H/berlin-photo.jpg" alt="Photo"></div>` }
];

// --- Marker generieren ---
locations.forEach(loc=>{
    let icon;
    if(loc.icon==="house") icon = L.icon({iconUrl:'https://i.ibb.co/Tmbj8x9/house-icon.png', iconSize:[40,40]});
    else icon = L.icon({iconUrl:'https://i.ibb.co/5n0tLhb/red-pin.png', iconSize:[30,40]});

    const marker = L.marker(loc.coords, {icon:icon}).addTo(map);
    if(loc.popupContent) marker.bindPopup(loc.popupContent);

    // Papierflieger bei Haus-Klick
    if(loc.icon==="house"){
        marker.on('click', ()=>{
            const target = locations.find(l=>l.icon==="house" && l.name!==loc.name);
            if(target) flyPlane(loc.coords, target.coords);
        });
    }
});

// --- Papierflieger ---
function flyPlane(fromLatLng, toLatLng){
    const plane = document.getElementById('plane');
    const fromPoint = map.latLngToContainerPoint(fromLatLng);
    const toPoint = map.latLngToContainerPoint(toLatLng);
    plane.style.display='block'; plane.style.left=fromPoint.x+'px'; plane.style.top=fromPoint.y+'px';
    let t=0; const duration=5000;
    function animate(){
        t+=20; const progress=t/duration;
        if(progress>1){ plane.style.display='none'; return; }
        const x = fromPoint.x + (toPoint.x-fromPoint.x)*progress;
        const y = fromPoint.y + (toPoint.y-fromPoint.y)*progress + Math.sin(progress*Math.PI)*-50;
        plane.style.left=x+'px'; plane.style.top=y+'px';
        requestAnimationFrame(animate);
    }
    animate();
}

// --- Tag/Nacht Modus ---
var hour = new Date().getHours();
if(hour>=20 || hour<6) document.body.classList.add('night');

</script>
</body>
</html>
